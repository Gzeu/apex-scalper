version: "3.9"

services:
  apex-scalper:
    build: .
    container_name: apex-scalper
    restart: always
    env_file:
      - .env
    environment:
      # Suprascrie valorile din .env daca vrei (optional)
      # BYBIT_TESTNET: "false"
      # SYMBOL: "BTCUSDT"
      LOG_LEVEL: "INFO"
    volumes:
      - ./data:/app/data       # SQLite DB persistenta
      - ./logs:/app/logs       # Log files
    ports:
      - "8080:8080"            # Health check endpoint
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
