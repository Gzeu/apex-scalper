version: "3.9"

# Apex Scalper — multi-symbol deployment
# Each service trades one symbol with its own tuned profile.
# Scale up/down by commenting out services you don't want.

services:

  # ─────────────────────────────────────────
  # 1. BTCUSDT — $2.1B/day (41.5% volume share)
  # ─────────────────────────────────────────
  apex-btc:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      SYMBOL: BTCUSDT
      LEVERAGE: "5"
      ORDER_SIZE_USDT: "20"
      TP1_PCT: "0.0012"
      TP2_PCT: "0.0025"
      SL_PCT: "0.0008"
      TRAIL_PCT: "0.0015"
      TRAIL_DELTA: "0.0005"
      MAX_HOLD_CANDLES: "5"
      MAX_SPREAD_BPS: "3.0"
      MIN_BID_DEPTH: "1.0"
      MIN_ASK_DEPTH: "1.0"
      ATR_MIN_PCT: "0.00025"
      ATR_MAX_PCT: "0.004"
      RSI_LONG_MIN: "52.0"
      RSI_SHORT_MAX: "48.0"
      ENTRY_THRESHOLD: "0.60"
      VOL_ZSCORE_MIN: "0.0"
    volumes:
      - ./logs/btc:/app/logs

  # ─────────────────────────────────────────
  # 2. ETHUSDT — $875M/day (17.4% volume share)
  # ─────────────────────────────────────────
  apex-eth:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      SYMBOL: ETHUSDT
      LEVERAGE: "7"
      ORDER_SIZE_USDT: "15"
      TP1_PCT: "0.0013"
      TP2_PCT: "0.0028"
      SL_PCT: "0.0009"
      TRAIL_PCT: "0.0018"
      TRAIL_DELTA: "0.0006"
      MAX_HOLD_CANDLES: "5"
      MAX_SPREAD_BPS: "3.5"
      MIN_BID_DEPTH: "5.0"
      MIN_ASK_DEPTH: "5.0"
      ATR_MIN_PCT: "0.0003"
      ATR_MAX_PCT: "0.005"
      RSI_LONG_MIN: "51.0"
      RSI_SHORT_MAX: "49.0"
      ENTRY_THRESHOLD: "0.58"
      VOL_ZSCORE_MIN: "0.0"
    volumes:
      - ./logs/eth:/app/logs

  # ─────────────────────────────────────────
  # 3. HYPEUSDT — $261M/day (5.2%) — high momentum
  # ─────────────────────────────────────────
  apex-hype:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      SYMBOL: HYPEUSDT
      LEVERAGE: "5"
      ORDER_SIZE_USDT: "10"
      TP1_PCT: "0.0020"
      TP2_PCT: "0.0045"
      SL_PCT: "0.0015"
      TRAIL_PCT: "0.0025"
      TRAIL_DELTA: "0.0010"
      MAX_HOLD_CANDLES: "4"
      MAX_SPREAD_BPS: "8.0"
      MIN_BID_DEPTH: "50.0"
      MIN_ASK_DEPTH: "50.0"
      ATR_MIN_PCT: "0.0006"
      ATR_MAX_PCT: "0.010"
      RSI_LONG_MIN: "53.0"
      RSI_SHORT_MAX: "47.0"
      ENTRY_THRESHOLD: "0.65"
      VOL_ZSCORE_MIN: "0.3"
    volumes:
      - ./logs/hype:/app/logs

  # ─────────────────────────────────────────
  # 4. DOGEUSDT — $134M/day (2.7%) — meme, choppy
  # ─────────────────────────────────────────
  apex-doge:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      SYMBOL: DOGEUSDT
      LEVERAGE: "5"
      ORDER_SIZE_USDT: "10"
      TP1_PCT: "0.0018"
      TP2_PCT: "0.0040"
      SL_PCT: "0.0012"
      TRAIL_PCT: "0.0020"
      TRAIL_DELTA: "0.0008"
      MAX_HOLD_CANDLES: "4"
      MAX_SPREAD_BPS: "6.0"
      MIN_BID_DEPTH: "5000.0"
      MIN_ASK_DEPTH: "5000.0"
      ATR_MIN_PCT: "0.0004"
      ATR_MAX_PCT: "0.008"
      RSI_LONG_MIN: "54.0"
      RSI_SHORT_MAX: "46.0"
      ENTRY_THRESHOLD: "0.68"
      VOL_ZSCORE_MIN: "0.5"
    volumes:
      - ./logs/doge:/app/logs

  # ─────────────────────────────────────────
  # 5. NEARUSDT — $102M/day (2.0%) — mid-cap altcoin
  # ─────────────────────────────────────────
  apex-near:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      SYMBOL: NEARUSDT
      LEVERAGE: "6"
      ORDER_SIZE_USDT: "10"
      TP1_PCT: "0.0015"
      TP2_PCT: "0.0033"
      SL_PCT: "0.0010"
      TRAIL_PCT: "0.0020"
      TRAIL_DELTA: "0.0007"
      MAX_HOLD_CANDLES: "4"
      MAX_SPREAD_BPS: "7.0"
      MIN_BID_DEPTH: "200.0"
      MIN_ASK_DEPTH: "200.0"
      ATR_MIN_PCT: "0.0005"
      ATR_MAX_PCT: "0.009"
      RSI_LONG_MIN: "52.0"
      RSI_SHORT_MAX: "48.0"
      ENTRY_THRESHOLD: "0.63"
      VOL_ZSCORE_MIN: "0.2"
    volumes:
      - ./logs/near:/app/logs
